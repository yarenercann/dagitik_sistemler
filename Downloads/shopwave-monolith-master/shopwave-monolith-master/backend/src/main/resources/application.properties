spring.application.name=shopwave-monolith

# ─── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shopwave}
spring.datasource.username=${DB_USER:shopwave}
spring.datasource.password=${DB_PASSWORD:shopwave}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Server ──────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.shopwave=INFO
logging.level.org.springframework.web=INFO

# ════════════════════════════════════════════════════════════════
# LAB PLACEHOLDERS
# Aşağıdaki özellikler henüz implement edilmemiştir.
# Her lab adımında ilgili satırın yorumu açılacak ve
# karşılık gelen kod yazılacaktır.
# ════════════════════════════════════════════════════════════════

# LAB-1 ── Structured Logging & Correlation-ID
# Her isteğe otomatik X-Correlation-ID header'ı ekler.
# MDC'ye correlation-id yazılır, tüm log satırlarında görünür.
# shopwave.logging.correlation-id.enabled=false
# shopwave.logging.structured.enabled=false

# LAB-2 ── Gecikme & Jitter Enjeksiyonu
# Servis metotlarına yapay gecikme ekler (kaos mühendisliği temeli).
# shopwave.chaos.delay.enabled=false
# shopwave.chaos.delay.fixed-ms=0
# shopwave.chaos.delay.jitter-ms=0
# shopwave.chaos.delay.target-operations=placeOrder,reserveStock

# LAB-3 ── p95 / p99 Gecikme Ölçümü
# Micrometer histogram ile her endpoint'in gecikme dağılımını ölçer.
# shopwave.metrics.percentiles.enabled=false

# LAB-4 ── Timeout & Deadline
# Stok rezervasyonu gibi kritik işlemlere maksimum süre sınırı koyar.
# shopwave.timeout.stock-reservation-ms=2000
# shopwave.timeout.order-placement-ms=5000

# LAB-5 ── Idempotency
# Aynı sipariş isteğinin iki kez işlenmesini önler.
# İstemci X-Idempotency-Key header'ı gönderir; sunucu ilk sonucu cache'ler.
# shopwave.idempotency.enabled=false
# shopwave.idempotency.ttl-seconds=300

# LAB-6 ── Rate Limiting  (bu lab'da backend'e taşınır)
# shopwave.rate-limit.enabled=false
# shopwave.rate-limit.requests-per-minute=60
